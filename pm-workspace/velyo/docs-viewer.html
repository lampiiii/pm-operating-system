<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorer — PM OS</title>
  <!-- Replace with your own favicon: <link rel="icon" href="/resources/favicon.png" type="image/png"> -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Theme variables ── */
    :root {
      --blue: #1a73e8;
      --blue-hover: #185abc;
      --blue-bg: rgba(26,115,232,0.08);
      --yellow: #f59e0b;
      --text: #202124;
      --text-secondary: #5f6368;
      --text-muted: #9aa0a6;
      --text-faint: #dadce0;
      --surface: #ffffff;
      --surface-dim: #f8f9fa;
      --surface-hover: #f1f3f4;
      --border: #dadce0;
      --border-light: #e8eaed;
      --shadow-sm: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px rgba(60,64,67,0.15);
      --shadow-md: 0 1px 2px rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
      --radius: 8px;
      --transition: 0.2s ease;
      --sidebar-width: 280px;
      --toc-width: 220px;
      --green: #16a34a;
      --green-bg: rgba(22,163,74,0.1);
      --red: #dc2626;
      --red-bg: rgba(220,38,38,0.1);
    }
    [data-theme="dark"] {
      --blue: #89b4fa;
      --blue-hover: #a6c8ff;
      --blue-bg: rgba(137,180,250,0.12);
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #5f6368;
      --text-faint: #3c4043;
      --surface: #1a1a2e;
      --surface-dim: #131325;
      --surface-hover: #232340;
      --border: #2d2d4a;
      --border-light: #252542;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
      --green: #4ade80;
      --green-bg: rgba(74,222,128,0.1);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', 'Google Sans Text', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Reading progress bar ── */
    .reading-progress {
      position: fixed;
      top: 56px;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #4285f4, #34a853, #fbbc04, #ea4335);
      width: 0%;
      z-index: 150;
      transition: width 0.1s linear;
      border-radius: 0 2px 2px 0;
    }

    /* ── Layout ── */
    .docs-layout {
      display: flex;
      height: calc(100vh - 56px);
      margin-top: 56px;
    }

    /* ── Sidebar ── */
    .docs-sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      border-right: 1px solid var(--border);
      background: var(--surface-dim);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s, min-width 0.2s;
    }
    .docs-sidebar.collapsed {
      width: 0; min-width: 0; border-right: none;
    }
    .docs-sidebar.collapsed > * { display: none; }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sidebar-header h2 {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px; flex: 1;
    }

    /* Search input */
    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }
    .sidebar-search-icon {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--text-muted); pointer-events: none;
    }
    .sidebar-search input {
      width: 100%; height: 32px; padding: 0 10px 0 32px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .sidebar-search input:focus { border-color: var(--blue); }

    /* Full-text search results overlay */
    .search-results-overlay {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 8px 8px;
      max-height: 320px; overflow-y: auto; z-index: 100;
      box-shadow: var(--shadow-md); display: none;
    }
    .search-results-overlay.visible { display: block; }
    .search-result-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }
    .search-result-item:hover { background: var(--blue-bg); }
    .search-result-item:last-child { border-bottom: none; }
    .search-results-header { padding: 8px 12px 4px; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .search-result-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
    .search-match-count { font-size: 10px; font-weight: 500; color: var(--blue, #3b82f6); background: rgba(59,130,246,0.12); padding: 1px 6px; border-radius: 8px; white-space: nowrap; }
    .search-result-path { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .search-result-snippet { font-size: 12px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 2px; }
    .search-result-snippet:last-child { margin-bottom: 0; }
    .search-result-snippet mark { background: rgba(59,130,246,0.25); color: inherit; border-radius: 2px; padding: 0 1px; }
    .search-no-results { padding: 16px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .search-result-item.search-result-active { background: var(--blue-bg); outline: 2px solid var(--blue, #3b82f6); outline-offset: -2px; }
    .search-loading { padding: 16px; text-align: center; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .search-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue, #3b82f6); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    mark.content-search-hl { background: rgba(250,204,21,0.35); color: inherit; border-radius: 2px; padding: 0 1px; box-shadow: 0 0 0 1px rgba(250,204,21,0.5); }

    /* Find bar */
    .find-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }
    .find-bar input {
      flex: 1; max-width: 280px; padding: 5px 10px; font-size: 13px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--surface-alt, var(--surface)); color: var(--text); outline: none;
    }
    .find-bar input:focus { border-color: var(--blue); }
    .find-count { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: center; white-space: nowrap; }
    .find-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text);
      cursor: pointer; font-size: 14px; transition: background 0.15s;
    }
    .find-btn:hover { background: var(--blue-bg); }
    .find-close { font-size: 18px; }
    mark.find-hl { background: rgba(250,204,21,0.35); color: inherit; border-radius: 2px; padding: 0 1px; }
    mark.find-hl-active { background: rgba(249,115,22,0.5); box-shadow: 0 0 0 2px rgba(249,115,22,0.4); }

    .sidebar-content {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .sidebar-content::-webkit-scrollbar { width: 5px; }
    .sidebar-content::-webkit-scrollbar-track { background: transparent; }
    .sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Section labels */
    .section-label {
      padding: 10px 14px 5px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label svg { width: 12px; height: 12px; }
    .section-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* Favorites section */
    .favorites-section { flex-shrink: 0; }
    .favorites-section.empty { display: none; }
    .favorites-list { padding: 0 0 2px; }
    .favorites-list .tree-star { opacity: 1; color: var(--yellow); }

    /* Recently opened */
    .recents-section { flex-shrink: 0; }
    .recents-section.empty { display: none; }
    .recents-list { padding: 0 0 2px; }
    .recent-item {
      display: flex; align-items: center; padding: 4px 14px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); transition: background 0.1s, color 0.1s;
      gap: 6px; white-space: nowrap; overflow: hidden;
    }
    .recent-item:hover { background: var(--surface-hover); color: var(--text); }
    .recent-item.active { background: var(--blue-bg); color: var(--blue); }
    .recent-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
    .recent-item span { overflow: hidden; text-overflow: ellipsis; }

    /* Tree items */
    .tree-item {
      display: flex; align-items: center; padding: 4px 12px 4px 0;
      cursor: pointer; font-size: 13px; color: var(--text-secondary);
      transition: background 0.1s, color 0.1s; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; user-select: none;
    }
    .tree-item:hover { background: var(--surface-hover); color: var(--text); }
    .tree-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 500; }
    .tree-item-icon {
      width: 16px; height: 16px; flex-shrink: 0; margin-right: 6px;
      color: inherit; opacity: 0.6;
    }
    .tree-item.active .tree-item-icon { opacity: 1; }
    .tree-folder-toggle {
      width: 16px; height: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: transform 0.15s;
    }
    .tree-folder-toggle.open { transform: rotate(90deg); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }
    .tree-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    /* Star / Favorite */
    .tree-star {
      width: 16px; height: 16px; flex-shrink: 0; margin-left: auto;
      padding: 0; border: none; background: none; color: var(--text-faint);
      cursor: pointer; opacity: 0;
      transition: opacity 0.15s, color 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; margin-right: 4px;
    }
    .tree-star svg { width: 13px; height: 13px; }
    .tree-item:hover .tree-star { opacity: 1; }
    .tree-star.favorited { opacity: 1; color: var(--yellow); }
    .tree-star:hover { color: var(--yellow); transform: scale(1.15); }

    /* Drag-and-drop favorites */
    .favorites-list .tree-item { position: relative; }
    .favorites-list .tree-item.drag-over { border-top: 2px solid var(--blue); margin-top: -2px; }
    .favorites-list .tree-item.dragging { opacity: 0.4; }

    /* ── Main content area ── */
    .docs-main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
    }

    /* Toolbar */
    .docs-toolbar {
      height: 44px; padding: 0 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      background: var(--surface);
    }
    .toolbar-toggle {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
      border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .toolbar-toggle:hover { background: var(--surface-dim); color: var(--text); }
    .toolbar-toggle svg { width: 15px; height: 15px; }
    .toolbar-breadcrumb {
      font-size: 13px; color: var(--text-muted); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .toolbar-breadcrumb span { color: var(--text-secondary); }
    .toolbar-breadcrumb .crumb-sep { color: var(--text-faint); margin: 0 4px; }
    .toolbar-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .btn {
      height: 30px; padding: 0 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    }
    .btn:hover { background: var(--surface-dim); color: var(--text); }
    .btn svg { width: 13px; height: 13px; }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-hover); border-color: var(--blue-hover); color: #fff; }
    .btn-success { background: var(--green); border-color: var(--green); color: #fff; }
    .btn-success:hover { opacity: 0.9; color: #fff; }
    .btn.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }

    .save-status {
      font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
    }
    .save-status.saved { color: var(--green); }
    .save-status.saving { color: var(--blue); }
    .save-status.error { color: var(--red); }

    /* ── Content wrapper (holds doc + optional TOC) ── */
    .docs-content-wrapper {
      flex: 1; display: flex; overflow: hidden; position: relative;
    }
    .docs-content {
      flex: 1; overflow-y: auto; padding: 0; position: relative;
    }
    .docs-content::-webkit-scrollbar { width: 7px; }
    .docs-content::-webkit-scrollbar-track { background: transparent; }
    .docs-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Split pane */
    .docs-content-wrapper.split-view .docs-content { width: 50%; flex: none; }
    .split-divider {
      width: 1px; background: var(--border); flex-shrink: 0; cursor: col-resize;
      position: relative; display: none;
    }
    .split-divider::after {
      content: ''; position: absolute; top: 0; bottom: 0; left: -3px; right: -3px;
    }
    .docs-content-wrapper.split-view .split-divider { display: block; }
    .split-editor {
      width: 50%; flex: none; overflow-y: auto; display: none;
    }
    .docs-content-wrapper.split-view .split-editor { display: block; }
    .split-editor textarea {
      width: 100%; height: 100%; padding: 32px 32px 60px; background: transparent;
      border: none; color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; resize: none; outline: none; tab-size: 2;
    }
    .split-editor::-webkit-scrollbar { width: 7px; }
    .split-editor::-webkit-scrollbar-track { background: transparent; }
    .split-editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Empty state ── */
    .docs-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); gap: 12px;
    }
    .docs-empty svg { width: 40px; height: 40px; opacity: 0.3; }
    .docs-empty p { font-size: 14px; }
    .docs-empty .empty-hint { font-size: 12px; color: var(--text-faint); }

    /* ── Skeleton loading ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      max-width: 720px; margin: 0 auto; padding: 40px 48px;
    }
    .skeleton-line {
      height: 14px; border-radius: 4px; margin-bottom: 12px;
      background: linear-gradient(90deg, var(--surface-dim) 25%, var(--surface-hover) 50%, var(--surface-dim) 75%);
      background-size: 800px 14px;
      animation: shimmer 1.5s infinite linear;
    }
    .skeleton-line.title { height: 28px; width: 60%; margin-bottom: 20px; }
    .skeleton-line.subtitle { height: 20px; width: 45%; margin-bottom: 24px; }
    .skeleton-line:nth-child(3) { width: 100%; }
    .skeleton-line:nth-child(4) { width: 90%; }
    .skeleton-line:nth-child(5) { width: 95%; }
    .skeleton-line:nth-child(6) { width: 70%; }
    .skeleton-line:nth-child(7) { width: 85%; margin-top: 24px; height: 18px; margin-bottom: 16px; }
    .skeleton-line:nth-child(8) { width: 100%; }
    .skeleton-line:nth-child(9) { width: 80%; }
    .skeleton-line:nth-child(10) { width: 92%; }

    /* ── Markdown preview ── */
    .md-preview {
      max-width: 720px; margin: 0 auto; padding: 36px 48px 80px;
      line-height: 1.75; color: var(--text);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* File meta */
    .file-meta {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      font-size: 12px; color: var(--text-muted); padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .file-meta svg { width: 13px; height: 13px; flex-shrink: 0; }
    .file-meta-item { display: flex; align-items: center; gap: 4px; }

    .md-preview h1 { font-size: 26px; font-weight: 700; margin: 0 0 8px; line-height: 1.3; }
    .md-preview h2 { font-size: 21px; font-weight: 600; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); }
    .md-preview h3 { font-size: 17px; font-weight: 600; margin: 22px 0 8px; }
    .md-preview h4 { font-size: 15px; font-weight: 600; margin: 18px 0 6px; color: var(--text-secondary); }
    .md-preview h5, .md-preview h6 { font-size: 13px; font-weight: 600; margin: 14px 0 4px; color: var(--text-secondary); }
    .md-preview h1, .md-preview h2, .md-preview h3, .md-preview h4 {
      scroll-margin-top: 16px;
    }
    /* Heading anchor links */
    .md-preview h1 .heading-anchor, .md-preview h2 .heading-anchor,
    .md-preview h3 .heading-anchor, .md-preview h4 .heading-anchor {
      opacity: 0; margin-left: 6px; color: var(--text-muted); text-decoration: none;
      font-size: 0.75em; transition: opacity 0.15s; cursor: pointer;
    }
    .md-preview h1:hover .heading-anchor, .md-preview h2:hover .heading-anchor,
    .md-preview h3:hover .heading-anchor, .md-preview h4:hover .heading-anchor { opacity: 0.6; }
    .md-preview h1:hover .heading-anchor:hover, .md-preview h2:hover .heading-anchor:hover,
    .md-preview h3:hover .heading-anchor:hover, .md-preview h4:hover .heading-anchor:hover { opacity: 1; color: var(--blue); }

    .md-preview p { margin: 0 0 12px; font-size: 14.5px; }
    .md-preview ul, .md-preview ol { margin: 0 0 12px; padding-left: 24px; }
    .md-preview li { margin: 3px 0; font-size: 14.5px; }
    .md-preview li > ul, .md-preview li > ol { margin: 3px 0; }
    .md-preview a { color: var(--blue); text-decoration: none; }
    .md-preview a:hover { text-decoration: underline; }
    .md-preview strong { font-weight: 600; }
    .md-preview em { font-style: italic; }
    .md-preview code {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      background: var(--surface-dim); padding: 2px 5px; border-radius: 4px;
      border: 1px solid var(--border-light);
    }
    .md-preview pre {
      position: relative; background: var(--surface-dim); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin: 0 0 14px; overflow-x: auto;
    }
    .md-preview pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.6; }
    .code-copy-btn {
      position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-muted); cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .code-copy-btn svg { width: 14px; height: 14px; }
    .md-preview pre:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn:hover { color: var(--blue); border-color: var(--blue); }
    .code-copy-btn.copied { color: var(--green); border-color: var(--green); }
    .code-lang-label {
      position: absolute; top: 8px; left: 14px; font-size: 10px; font-weight: 600;
      color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px;
      font-family: 'Inter', sans-serif;
    }
    .md-preview pre.has-lang { padding-top: 28px; }
    .md-preview blockquote {
      border-left: 3px solid var(--blue); margin: 0 0 12px; padding: 8px 16px;
      background: var(--blue-bg); border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
    }
    .md-preview blockquote p { margin: 0; }
    .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .md-preview img { max-width: 100%; border-radius: var(--radius); }
    .md-preview table { width: 100%; border-collapse: collapse; margin: 0 0 14px; font-size: 13px; }
    .md-preview th, .md-preview td { padding: 7px 10px; border: 1px solid var(--border); text-align: left; }
    .md-preview th { background: var(--surface-dim); font-weight: 600; font-size: 12px; }

    /* Backlinks */
    .backlinks-section {
      max-width: 720px; margin: 0 auto; padding: 0 48px 40px;
      animation: fadeIn 0.2s ease;
    }
    .backlinks-section.empty { display: none; }
    .backlinks-header {
      font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 12px 0 8px; border-top: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 6px;
    }
    .backlinks-header svg { width: 13px; height: 13px; }
    .backlink-item {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      margin: 4px 4px 0 0; font-size: 12px; color: var(--text-secondary);
      background: var(--surface-dim); border: 1px solid var(--border-light);
      border-radius: 5px; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .backlink-item:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
    .backlink-item svg { width: 12px; height: 12px; opacity: 0.6; }

    /* ── Editor (full) ── */
    .md-editor {
      max-width: 720px; margin: 0 auto; padding: 36px 48px 80px;
      animation: fadeIn 0.2s ease;
    }
    .md-editor textarea {
      width: 100%; height: calc(100vh - 160px); padding: 0; background: transparent;
      border: none; color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; resize: none; outline: none; tab-size: 2;
    }

    /* ── Table of Contents (right sidebar) ── */
    .docs-toc {
      width: var(--toc-width); min-width: var(--toc-width); flex-shrink: 0;
      border-left: 1px solid var(--border); padding: 16px 12px; overflow-y: auto;
      display: none;
    }
    .docs-toc.visible { display: block; }
    .docs-content-wrapper.split-view .docs-toc { display: none; }
    .toc-title {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .toc-item {
      display: block; padding: 3px 8px; font-size: 12px; color: var(--text-muted);
      text-decoration: none; border-radius: 4px; cursor: pointer;
      transition: color 0.1s, background 0.1s; line-height: 1.4; margin: 1px 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border-left: 2px solid transparent;
    }
    .toc-item:hover { color: var(--text); background: var(--surface-hover); }
    .toc-item.active { color: var(--blue); border-left-color: var(--blue); background: var(--blue-bg); font-weight: 500; }
    .toc-item.depth-2 { padding-left: 16px; }
    .toc-item.depth-3 { padding-left: 24px; font-size: 11.5px; }
    .toc-item.depth-4 { padding-left: 32px; font-size: 11px; }
    .docs-toc::-webkit-scrollbar { width: 4px; }
    .docs-toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .docs-sidebar { width: 240px; min-width: 240px; }
      .md-preview, .md-editor, .backlinks-section { padding-left: 20px; padding-right: 20px; }
      .docs-toc { display: none !important; }
    }
  </style>
</head>
<body>
  <script src="/resources/navbar.js"></script>
  <div class="reading-progress" id="reading-progress"></div>

  <div class="docs-layout">
    <!-- Sidebar -->
    <aside class="docs-sidebar" id="sidebar">
      <div class="sidebar-header"><h2>Explorer</h2></div>
      <div class="sidebar-search" id="search-wrapper">
        <svg class="sidebar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="tree-search" placeholder="Search docs..." autocomplete="off">
        <div class="search-results-overlay" id="search-results"></div>
      </div>
      <div class="sidebar-content" id="sidebar-scroll">
        <!-- Favorites -->
        <div class="favorites-section empty" id="favorites-section">
          <div class="section-label"><svg viewBox="0 0 24 24" fill="var(--yellow)" stroke="var(--yellow)" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Favorites</div>
          <div class="favorites-list" id="favorites-list"></div>
          <hr class="section-divider">
        </div>
        <!-- Recently opened -->
        <div class="recents-section empty" id="recents-section">
          <div class="section-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Recent</div>
          <div class="recents-list" id="recents-list"></div>
          <hr class="section-divider">
        </div>
        <!-- File tree -->
        <div class="section-label">Files</div>
        <div id="tree-container"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="docs-main">
      <div class="docs-toolbar">
        <button class="toolbar-toggle" id="toggle-sidebar" title="Toggle sidebar (Cmd+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <div class="toolbar-breadcrumb" id="breadcrumb">
          <span style="color:var(--text-muted)">Select a file to view</span>
        </div>
        <div class="toolbar-actions" id="toolbar-actions"></div>
      </div>
      <div class="find-bar" id="find-bar" style="display:none">
        <input type="text" id="find-input" placeholder="Find in document..." spellcheck="false">
        <span class="find-count" id="find-count"></span>
        <button class="find-btn" id="find-prev" title="Previous (Shift+Enter)">&#8593;</button>
        <button class="find-btn" id="find-next" title="Next (Enter)">&#8595;</button>
        <button class="find-btn find-close" id="find-close" title="Close (Esc)">&times;</button>
      </div>
      <div class="docs-content-wrapper" id="content-wrapper">
        <div class="docs-content" id="content">
          <div class="docs-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            <p>Select a markdown file from the sidebar</p>
            <span class="empty-hint">Browse the folder tree or search across all docs</span>
          </div>
        </div>
        <div class="split-divider" id="split-divider"></div>
        <div class="split-editor" id="split-editor"></div>
        <div class="docs-toc" id="toc-panel"></div>
      </div>
    </main>
  </div>

  <script>
  (function() {
    'use strict';

    // ── State ──
    let fileTree = [];
    let currentFile = null;
    let currentContent = '';
    let currentMeta = {};
    let isEditing = false;
    let isSplitView = false;
    let isDirty = false;
    let favorites = JSON.parse(localStorage.getItem('velyo-docs-favorites') || '[]');
    let recents = JSON.parse(localStorage.getItem('velyo-docs-recents') || '[]');
    let searchTimeout = null;

    // ── DOM refs ──
    const treeContainer = document.getElementById('tree-container');
    const treeSearch = document.getElementById('tree-search');
    const searchResults = document.getElementById('search-results');
    const searchWrapper = document.getElementById('search-wrapper');
    const breadcrumb = document.getElementById('breadcrumb');
    const toolbarActions = document.getElementById('toolbar-actions');
    const content = document.getElementById('content');
    const contentWrapper = document.getElementById('content-wrapper');
    const splitEditor = document.getElementById('split-editor');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggle-sidebar');
    const favoritesSection = document.getElementById('favorites-section');
    const favoritesList = document.getElementById('favorites-list');
    const recentsSection = document.getElementById('recents-section');
    const recentsList = document.getElementById('recents-list');
    const tocPanel = document.getElementById('toc-panel');
    const readingProgress = document.getElementById('reading-progress');

    // ── SVG Icons ──
    const I = {
      folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>',
      folderOpen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2v1"/><path d="M2 10h20l-2 9H4z"/></svg>',
      file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
      chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
      edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
      eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
      save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
      split: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>',
      copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
      check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
      starEmpty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      starFilled: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
    };

    // ═══════════════════════════════════════
    // FAVORITES
    // ═══════════════════════════════════════
    function isFavorite(p) { return favorites.includes(p); }

    function toggleFavorite(folderPath) {
      if (isFavorite(folderPath)) favorites = favorites.filter(f => f !== folderPath);
      else favorites.push(folderPath);
      localStorage.setItem('velyo-docs-favorites', JSON.stringify(favorites));
      renderFavorites();
      // Update star in tree
      document.querySelectorAll(`.tree-star[data-fp="${folderPath}"]`).forEach(btn => {
        const fav = isFavorite(folderPath);
        btn.className = 'tree-star' + (fav ? ' favorited' : '');
        btn.innerHTML = fav ? I.starFilled : I.starEmpty;
      });
    }

    function findFolder(tree, fp) {
      for (const n of tree) {
        if (n.type === 'folder' && n.path === fp) return n;
        if (n.type === 'folder' && n.children) { const f = findFolder(n.children, fp); if (f) return f; }
      }
      return null;
    }

    function renderFavorites() {
      const valid = favorites.filter(f => findFolder(fileTree, f));
      if (!valid.length) { favoritesSection.classList.add('empty'); favoritesList.innerHTML = ''; return; }
      favoritesSection.classList.remove('empty');
      favoritesList.innerHTML = '';

      valid.forEach((fp, idx) => {
        const folder = findFolder(fileTree, fp);
        if (!folder) return;

        const row = document.createElement('div');
        row.className = 'tree-item';
        row.style.paddingLeft = '14px';
        row.draggable = true;
        row.dataset.favIdx = idx;

        // Drag-and-drop
        row.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', idx); row.classList.add('dragging'); });
        row.addEventListener('dragend', () => row.classList.remove('dragging'));
        row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
        row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
        row.addEventListener('drop', (e) => {
          e.preventDefault(); row.classList.remove('drag-over');
          const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
          const toIdx = idx;
          if (fromIdx === toIdx) return;
          const item = favorites.splice(fromIdx, 1)[0];
          favorites.splice(toIdx, 0, item);
          localStorage.setItem('velyo-docs-favorites', JSON.stringify(favorites));
          renderFavorites();
        });

        const toggle = document.createElement('span');
        toggle.className = 'tree-folder-toggle';
        toggle.innerHTML = I.chevron;

        const icon = document.createElement('span');
        icon.className = 'tree-item-icon';
        icon.innerHTML = I.folder;

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = folder.name;

        const star = document.createElement('button');
        star.className = 'tree-star favorited';
        star.innerHTML = I.starFilled;
        star.dataset.fp = fp;
        star.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(fp); });

        row.append(toggle, icon, name, star);
        favoritesList.appendChild(row);

        const children = document.createElement('div');
        children.className = 'tree-children';
        favoritesList.appendChild(children);

        row.addEventListener('click', () => {
          toggle.classList.toggle('open');
          children.classList.toggle('open');
          icon.innerHTML = children.classList.contains('open') ? I.folderOpen : I.folder;
        });

        buildSubTree(folder.children || [], children, 1);
      });
    }

    function buildSubTree(items, parent, depth) {
      for (const item of items) {
        if (item.type === 'folder') {
          const row = document.createElement('div');
          row.className = 'tree-item';
          row.style.paddingLeft = (14 + depth * 16) + 'px';
          const t = document.createElement('span'); t.className = 'tree-folder-toggle'; t.innerHTML = I.chevron;
          const ic = document.createElement('span'); ic.className = 'tree-item-icon'; ic.innerHTML = I.folder;
          const n = document.createElement('span'); n.className = 'tree-name'; n.textContent = item.name;
          row.append(t, ic, n); parent.appendChild(row);
          const ch = document.createElement('div'); ch.className = 'tree-children'; parent.appendChild(ch);
          row.addEventListener('click', () => {
            t.classList.toggle('open'); ch.classList.toggle('open');
            ic.innerHTML = ch.classList.contains('open') ? I.folderOpen : I.folder;
          });
          buildSubTree(item.children || [], ch, depth + 1);
        } else {
          const row = document.createElement('div');
          row.className = 'tree-item';
          row.style.paddingLeft = (14 + depth * 16 + 16) + 'px';
          row.dataset.path = item.path;
          const ic = document.createElement('span'); ic.className = 'tree-item-icon'; ic.innerHTML = I.file;
          const n = document.createElement('span'); n.className = 'tree-name'; n.textContent = item.name;
          row.append(ic, n); parent.appendChild(row);
          row.addEventListener('click', () => openFile(item.path));
        }
      }
    }

    // ═══════════════════════════════════════
    // RECENTS
    // ═══════════════════════════════════════
    function addRecent(filePath) {
      recents = recents.filter(r => r !== filePath);
      recents.unshift(filePath);
      if (recents.length > 8) recents = recents.slice(0, 8);
      localStorage.setItem('velyo-docs-recents', JSON.stringify(recents));
      renderRecents();
    }

    function renderRecents() {
      if (!recents.length) { recentsSection.classList.add('empty'); recentsList.innerHTML = ''; return; }
      recentsSection.classList.remove('empty');
      recentsList.innerHTML = '';
      for (const fp of recents) {
        const name = fp.split('/').pop();
        const row = document.createElement('div');
        row.className = 'recent-item' + (fp === currentFile ? ' active' : '');
        row.innerHTML = `${I.clock}<span title="${fp}">${name}</span>`;
        row.addEventListener('click', () => openFile(fp));
        recentsList.appendChild(row);
      }
    }

    // ═══════════════════════════════════════
    // FILE TREE
    // ═══════════════════════════════════════
    async function loadTree() {
      try {
        const res = await fetch('/api/files/tree');
        const data = await res.json();
        fileTree = data.tree || [];
        renderTree(fileTree);
        renderFavorites();
        renderRecents();
      } catch (err) {
        treeContainer.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px;">Failed to load</div>';
      }
    }

    function renderTree(tree, filter = '') {
      treeContainer.innerHTML = '';
      buildTreeDOM(tree, treeContainer, 0, filter.toLowerCase());
    }

    function buildTreeDOM(items, parent, depth, filter) {
      for (const item of items) {
        if (item.type === 'folder') {
          if (filter && !hasMatch(item, filter)) continue;
          const row = document.createElement('div');
          row.className = 'tree-item';
          row.style.paddingLeft = (14 + depth * 16) + 'px';

          const t = document.createElement('span'); t.className = 'tree-folder-toggle' + (filter ? ' open' : ''); t.innerHTML = I.chevron;
          const ic = document.createElement('span'); ic.className = 'tree-item-icon'; ic.innerHTML = filter ? I.folderOpen : I.folder;
          const n = document.createElement('span'); n.className = 'tree-name'; n.textContent = item.name;

          const star = document.createElement('button');
          star.className = 'tree-star' + (isFavorite(item.path) ? ' favorited' : '');
          star.innerHTML = isFavorite(item.path) ? I.starFilled : I.starEmpty;
          star.dataset.fp = item.path;
          star.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(item.path); });

          row.append(t, ic, n, star); parent.appendChild(row);
          const ch = document.createElement('div'); ch.className = 'tree-children' + (filter ? ' open' : ''); parent.appendChild(ch);
          row.addEventListener('click', () => {
            t.classList.toggle('open'); ch.classList.toggle('open');
            ic.innerHTML = ch.classList.contains('open') ? I.folderOpen : I.folder;
          });
          buildTreeDOM(item.children || [], ch, depth + 1, filter);
        } else {
          if (filter && !item.name.toLowerCase().includes(filter) && !item.path.toLowerCase().includes(filter)) continue;
          const row = document.createElement('div');
          row.className = 'tree-item';
          row.style.paddingLeft = (14 + depth * 16 + 16) + 'px';
          row.dataset.path = item.path;
          const ic = document.createElement('span'); ic.className = 'tree-item-icon'; ic.innerHTML = I.file;
          const n = document.createElement('span'); n.className = 'tree-name'; n.textContent = item.name;
          row.append(ic, n); parent.appendChild(row);
          row.addEventListener('click', () => openFile(item.path));
        }
      }
    }

    function hasMatch(folder, filter) {
      for (const c of (folder.children || [])) {
        if (c.type === 'file' && (c.name.toLowerCase().includes(filter) || c.path.toLowerCase().includes(filter))) return true;
        if (c.type === 'folder' && hasMatch(c, filter)) return true;
      }
      return false;
    }

    // ═══════════════════════════════════════
    // SEARCH (full-text)
    // ═══════════════════════════════════════
    let searchHighlightIdx = -1;

    treeSearch.addEventListener('input', (e) => {
      const q = e.target.value.trim();
      searchHighlightIdx = -1;
      // If short, do local tree filter
      if (q.length < 3) {
        searchResults.classList.remove('visible');
        renderTree(fileTree, q);
        return;
      }
      // Show loading spinner
      searchResults.innerHTML = '<div class="search-loading"><span class="search-spinner"></span> Searching...</div>';
      searchResults.classList.add('visible');
      // Debounce full-text search
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => fullTextSearch(q), 250);
    });

    treeSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { searchResults.classList.remove('visible'); treeSearch.blur(); searchHighlightIdx = -1; return; }
      const items = searchResults.querySelectorAll('.search-result-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (searchHighlightIdx >= 0) items[searchHighlightIdx].classList.remove('search-result-active');
        searchHighlightIdx = searchHighlightIdx >= items.length - 1 ? 0 : searchHighlightIdx + 1;
        items[searchHighlightIdx].classList.add('search-result-active');
        items[searchHighlightIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (searchHighlightIdx >= 0) items[searchHighlightIdx].classList.remove('search-result-active');
        searchHighlightIdx = searchHighlightIdx <= 0 ? items.length - 1 : searchHighlightIdx - 1;
        items[searchHighlightIdx].classList.add('search-result-active');
        items[searchHighlightIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const active = items[searchHighlightIdx] || items[0];
        if (active) {
          pendingSearchHighlight = treeSearch.value.trim();
          openFile(active.dataset.path);
          searchResults.classList.remove('visible');
          treeSearch.value = '';
          searchHighlightIdx = -1;
          renderTree(fileTree);
        }
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-wrapper')) { searchResults.classList.remove('visible'); searchHighlightIdx = -1; }
    });

    async function fullTextSearch(query) {
      try {
        const res = await fetch(`/api/files/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        searchHighlightIdx = -1;
        renderSearchResults(data.results || [], query);
      } catch { searchResults.innerHTML = '<div class="search-no-results">Search failed</div>'; searchResults.classList.add('visible'); }
    }

    function renderSearchResults(results, query) {
      if (!results.length) {
        searchResults.innerHTML = '<div class="search-no-results">No results found</div>';
        searchResults.classList.add('visible');
        return;
      }
      // Build regex that highlights all query terms (split by space)
      const terms = query.trim().split(/\s+/).filter(Boolean);
      const rePattern = terms.map(t => escapeRegex(t)).join('|');
      const re = new RegExp(`(${rePattern})`, 'gi');
      searchResults.innerHTML = `<div class="search-results-header">${results.length} file${results.length !== 1 ? 's' : ''} found</div>` +
        results.slice(0, 25).map(r => {
        const snippets = (r.snippets || [r.snippet]).slice(0, 3);
        const snippetHTML = snippets.map(s => {
          const highlighted = escapeHtml(s).replace(re, '<mark>$1</mark>');
          return `<div class="search-result-snippet">${highlighted}</div>`;
        }).join('');
        const pathParts = r.path.split('/');
        const dir = pathParts.slice(0, -1).join('/');
        const matchBadge = r.matchCount ? `<span class="search-match-count">${r.matchCount} match${r.matchCount !== 1 ? 'es' : ''}</span>` : '';
        return `<div class="search-result-item" data-path="${r.path}">
          <div class="search-result-name">${r.name} ${matchBadge}</div>
          ${dir ? `<div class="search-result-path">${dir}</div>` : ''}
          ${snippetHTML}
        </div>`;
      }).join('');
      searchResults.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          pendingSearchHighlight = query;
          openFile(el.dataset.path);
          searchResults.classList.remove('visible');
          treeSearch.value = '';
          renderTree(fileTree);
        });
      });
      searchResults.classList.add('visible');
    }

    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    // ═══════════════════════════════════════
    // FIND IN PAGE (Cmd+F)
    // ═══════════════════════════════════════
    const findBar = document.getElementById('find-bar');
    const findInput = document.getElementById('find-input');
    const findCount = document.getElementById('find-count');
    let findMarks = [];
    let findIdx = -1;
    let findDebounce = null;

    function openFind() {
      findBar.style.display = 'flex';
      findInput.focus();
      if (findInput.value) findInput.select();
    }
    function closeFind() {
      findBar.style.display = 'none';
      findInput.value = '';
      clearFindMarks();
    }
    function clearFindMarks() {
      findMarks.forEach(mark => {
        const parent = mark.parentNode;
        if (parent) { parent.replaceChild(document.createTextNode(mark.textContent), mark); parent.normalize(); }
      });
      findMarks = [];
      findIdx = -1;
      findCount.textContent = '';
    }
    function runFind(query) {
      clearFindMarks();
      if (!query || query.length < 1) return;
      const preview = content.querySelector('.md-preview');
      if (!preview) return;
      const re = new RegExp(escapeRegex(query), 'gi');
      const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      let node;
      while (node = walker.nextNode()) {
        if (node.parentElement.closest('code, pre, .code-copy-btn, .heading-anchor, .file-meta')) continue;
        if (re.test(node.textContent)) textNodes.push(node);
        re.lastIndex = 0;
      }
      textNodes.forEach(textNode => {
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        const text = textNode.textContent;
        re.lastIndex = 0;
        let m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
          const mark = document.createElement('mark');
          mark.className = 'find-hl';
          mark.textContent = m[0];
          findMarks.push(mark);
          frag.appendChild(mark);
          lastIdx = re.lastIndex;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        textNode.parentNode.replaceChild(frag, textNode);
      });
      if (findMarks.length) {
        findIdx = 0;
        goToFindMatch(0);
      } else {
        findCount.textContent = 'No results';
      }
    }
    function goToFindMatch(idx) {
      if (!findMarks.length) return;
      findMarks.forEach(m => m.classList.remove('find-hl-active'));
      findIdx = ((idx % findMarks.length) + findMarks.length) % findMarks.length;
      findMarks[findIdx].classList.add('find-hl-active');
      findMarks[findIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      findCount.textContent = `${findIdx + 1} of ${findMarks.length}`;
    }

    findInput.addEventListener('input', () => {
      clearTimeout(findDebounce);
      findDebounce = setTimeout(() => runFind(findInput.value), 150);
    });
    findInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeFind(); return; }
      if (e.key === 'Enter') {
        e.preventDefault();
        if (findMarks.length) goToFindMatch(e.shiftKey ? findIdx - 1 : findIdx + 1);
      }
    });
    document.getElementById('find-next').addEventListener('click', () => { if (findMarks.length) goToFindMatch(findIdx + 1); });
    document.getElementById('find-prev').addEventListener('click', () => { if (findMarks.length) goToFindMatch(findIdx - 1); });
    document.getElementById('find-close').addEventListener('click', closeFind);

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'f' && currentFile) {
        e.preventDefault();
        openFind();
      }
    });

    let pendingSearchHighlight = '';

    function highlightContentMatches(query) {
      if (!query) return;
      const terms = query.trim().split(/\s+/).filter(Boolean);
      if (!terms.length) return;
      const rePattern = terms.map(t => escapeRegex(t)).join('|');
      const re = new RegExp(rePattern, 'gi');
      const preview = content.querySelector('.md-preview');
      if (!preview) return;

      const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT);
      const matches = [];
      let node;
      while (node = walker.nextNode()) {
        if (node.parentElement.closest('code, pre, .code-copy-btn, .heading-anchor, .file-meta')) continue;
        if (re.test(node.textContent)) {
          matches.push(node);
        }
        re.lastIndex = 0;
      }
      let firstMark = null;
      matches.forEach(textNode => {
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        const text = textNode.textContent;
        re.lastIndex = 0;
        let m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
          const mark = document.createElement('mark');
          mark.className = 'content-search-hl';
          mark.textContent = m[0];
          if (!firstMark) firstMark = mark;
          frag.appendChild(mark);
          lastIdx = re.lastIndex;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        textNode.parentNode.replaceChild(frag, textNode);
      });
      if (firstMark) {
        setTimeout(() => firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
      }
    }

    // ═══════════════════════════════════════
    // OPEN FILE
    // ═══════════════════════════════════════
    async function openFile(filePath) {
      if (isDirty && !confirm('You have unsaved changes. Discard them?')) return;

      // Show skeleton
      content.innerHTML = `<div class="skeleton">
        <div class="skeleton-line title"></div><div class="skeleton-line subtitle"></div>
        <div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>
        <div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>
        <div class="skeleton-line"></div><div class="skeleton-line"></div>
      </div>`;

      try {
        const res = await fetch(`/api/files/read?path=${encodeURIComponent(filePath)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        currentFile = filePath;
        currentContent = data.content;
        currentMeta = { modifiedAt: data.modifiedAt };
        isEditing = false;
        isSplitView = false;
        isDirty = false;
        contentWrapper.classList.remove('split-view');
        splitEditor.innerHTML = '';

        // Highlight active
        document.querySelectorAll('.tree-item.active, .recent-item.active').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`[data-path="${CSS.escape(filePath)}"]`).forEach(el => el.classList.add('active'));

        addRecent(filePath);
        updateBreadcrumb(filePath);
        renderPreview();
        updateToolbar();
        loadBacklinks(filePath);
      } catch (err) {
        content.innerHTML = `<div class="docs-empty"><p style="color:var(--red)">Error: ${err.message}</p></div>`;
      }
    }

    // ═══════════════════════════════════════
    // BREADCRUMB
    // ═══════════════════════════════════════
    function updateBreadcrumb(fp) {
      const parts = fp.split('/');
      breadcrumb.innerHTML = parts.map((p, i) =>
        (i > 0 ? '<span class="crumb-sep">/</span>' : '') +
        `<span style="${i === parts.length - 1 ? 'color:var(--text);font-weight:500' : ''}">${p}</span>`
      ).join('');
    }

    // ═══════════════════════════════════════
    // TOOLBAR
    // ═══════════════════════════════════════
    function updateToolbar() {
      if (!currentFile) { toolbarActions.innerHTML = ''; return; }

      if (isEditing) {
        toolbarActions.innerHTML = `
          <span class="save-status" id="save-status"></span>
          <button class="btn btn-success" id="btn-save">${I.save} Save</button>
          <button class="btn" id="btn-preview">${I.eye} Preview</button>
        `;
        document.getElementById('btn-save').addEventListener('click', saveFile);
        document.getElementById('btn-preview').addEventListener('click', () => {
          if (isDirty && !confirm('Discard unsaved changes?')) return;
          isEditing = false; isDirty = false;
          renderPreview(); updateToolbar();
        });
      } else {
        toolbarActions.innerHTML = `
          <button class="btn" id="btn-split" title="Split view (Cmd+\\)">${I.split} Split</button>
          <button class="btn" id="btn-edit" title="Edit (Cmd+E)">${I.edit} Edit</button>
        `;
        document.getElementById('btn-edit').addEventListener('click', () => {
          isEditing = true; isSplitView = false;
          contentWrapper.classList.remove('split-view'); splitEditor.innerHTML = '';
          renderEditor(); updateToolbar();
        });
        document.getElementById('btn-split').addEventListener('click', toggleSplit);
      }
    }

    // ═══════════════════════════════════════
    // SPLIT VIEW
    // ═══════════════════════════════════════
    function toggleSplit() {
      isSplitView = !isSplitView;
      if (isSplitView) {
        contentWrapper.classList.add('split-view');
        splitEditor.innerHTML = `<textarea spellcheck="false">${escapeHtml(currentContent)}</textarea>`;
        const ta = splitEditor.querySelector('textarea');
        ta.addEventListener('input', () => {
          isDirty = true;
          currentContent = ta.value;
          renderPreview();
        });
        ta.addEventListener('keydown', handleEditorKeys);
        // Update split button state
        const splitBtn = document.getElementById('btn-split');
        if (splitBtn) splitBtn.classList.add('active');
      } else {
        contentWrapper.classList.remove('split-view');
        splitEditor.innerHTML = '';
        const splitBtn = document.getElementById('btn-split');
        if (splitBtn) splitBtn.classList.remove('active');
      }
    }

    // ═══════════════════════════════════════
    // RENDER PREVIEW
    // ═══════════════════════════════════════
    function renderPreview() {
      const modDate = currentMeta.modifiedAt ? new Date(currentMeta.modifiedAt) : null;
      const modStr = modDate ? modDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + modDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';

      const metaHtml = modStr ? `<div class="file-meta">
        <span class="file-meta-item">${I.clock} Last edited ${modStr}</span>
      </div>` : '';

      content.innerHTML = `<div class="md-preview">${metaHtml}${renderMarkdown(currentContent)}</div><div class="backlinks-section empty" id="backlinks"></div>`;

      // Attach copy buttons
      content.querySelectorAll('.code-copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.closest('pre').querySelector('code').textContent;
          navigator.clipboard.writeText(code).then(() => {
            btn.innerHTML = I.check; btn.classList.add('copied');
            setTimeout(() => { btn.innerHTML = I.copy; btn.classList.remove('copied'); }, 1500);
          });
        });
      });

      // Heading anchor clicks
      content.querySelectorAll('.heading-anchor').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.getElementById(a.dataset.target);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      buildTOC();
      if (currentFile) renderBacklinks();

      // Highlight search terms if navigated from search
      if (pendingSearchHighlight) {
        highlightContentMatches(pendingSearchHighlight);
        pendingSearchHighlight = '';
      }
    }

    // ═══════════════════════════════════════
    // TABLE OF CONTENTS + SCROLL SPY
    // ═══════════════════════════════════════
    function buildTOC() {
      const headings = content.querySelectorAll('.md-preview h1, .md-preview h2, .md-preview h3, .md-preview h4');
      if (headings.length < 2) { tocPanel.classList.remove('visible'); tocPanel.innerHTML = ''; return; }

      tocPanel.classList.add('visible');
      let html = '<div class="toc-title">On this page</div>';
      headings.forEach((h) => {
        const level = parseInt(h.tagName[1]);
        const id = h.id;
        const text = h.textContent.replace('#', '').trim();
        if (text && id) {
          html += `<a class="toc-item depth-${level}" data-target="${id}">${text}</a>`;
        }
      });
      tocPanel.innerHTML = html;

      tocPanel.querySelectorAll('.toc-item').forEach(item => {
        item.addEventListener('click', () => {
          const el = document.getElementById(item.dataset.target);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      // Scroll spy
      const scrollEl = content;
      scrollEl.addEventListener('scroll', () => {
        // Reading progress
        const scrollTop = scrollEl.scrollTop;
        const scrollHeight = scrollEl.scrollHeight - scrollEl.clientHeight;
        const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
        readingProgress.style.width = pct + '%';

        // Active TOC item
        let activeId = '';
        headings.forEach(h => {
          if (h.getBoundingClientRect().top < 120) activeId = h.id;
        });
        tocPanel.querySelectorAll('.toc-item').forEach(item => {
          item.classList.toggle('active', item.dataset.target === activeId);
        });
      });
    }

    // ═══════════════════════════════════════
    // BACKLINKS
    // ═══════════════════════════════════════
    let backlinkCache = {};
    async function loadBacklinks(fp) {
      try {
        const res = await fetch(`/api/files/backlinks?path=${encodeURIComponent(fp)}`);
        const data = await res.json();
        backlinkCache[fp] = data.backlinks || [];
        renderBacklinks();
      } catch { /* ignore */ }
    }

    function renderBacklinks() {
      const bl = backlinkCache[currentFile] || [];
      const el = document.getElementById('backlinks');
      if (!el) return;
      if (!bl.length) { el.classList.add('empty'); el.innerHTML = ''; return; }
      el.classList.remove('empty');
      el.innerHTML = `<div class="backlinks-header">${I.link} Linked from</div>
        <div>${bl.map(b => `<span class="backlink-item" data-path="${b.path}">${I.file} ${b.name.replace('.md','')}</span>`).join('')}</div>`;
      el.querySelectorAll('.backlink-item').forEach(item => {
        item.addEventListener('click', () => openFile(item.dataset.path));
      });
    }

    // ═══════════════════════════════════════
    // EDITOR (full page)
    // ═══════════════════════════════════════
    function renderEditor() {
      content.innerHTML = `<div class="md-editor"><textarea spellcheck="false">${escapeHtml(currentContent)}</textarea></div>`;
      tocPanel.classList.remove('visible');
      const ta = content.querySelector('textarea');
      ta.focus();
      ta.addEventListener('input', () => {
        isDirty = true;
        const s = document.getElementById('save-status');
        if (s) { s.textContent = 'Unsaved changes'; s.className = 'save-status'; }
      });
      ta.addEventListener('keydown', handleEditorKeys);
    }

    function handleEditorKeys(e) {
      const ta = e.target;
      if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveFile(); }
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = s + 2;
        isDirty = true;
      }
    }

    // ═══════════════════════════════════════
    // SAVE
    // ═══════════════════════════════════════
    async function saveFile() {
      const ta = isEditing ? content.querySelector('.md-editor textarea') : splitEditor.querySelector('textarea');
      if (!ta || !currentFile) return;

      const status = document.getElementById('save-status');
      if (status) { status.textContent = 'Saving...'; status.className = 'save-status saving'; }

      try {
        const res = await fetch('/api/files/write', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: currentFile, content: ta.value })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        currentContent = ta.value;
        isDirty = false;
        if (isSplitView) renderPreview();
        if (status) { status.textContent = 'Saved'; status.className = 'save-status saved'; }
        setTimeout(() => { if (status && status.textContent === 'Saved') status.textContent = ''; }, 2000);
      } catch (err) {
        if (status) { status.textContent = 'Save failed'; status.className = 'save-status error'; }
      }
    }

    // ═══════════════════════════════════════
    // MARKDOWN RENDERER
    // ═══════════════════════════════════════
    function renderMarkdown(md) {
      if (!md) return '';
      let html = escapeHtml(md);

      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const langLabel = lang ? `<span class="code-lang-label">${lang}</span>` : '';
        const hasLang = lang ? ' has-lang' : '';
        return `<pre class="${hasLang}">${langLabel}<button class="code-copy-btn" title="Copy">${I.copy}</button><code class="language-${lang}">${code.trim()}</code></pre>`;
      });

      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

      // Headers with IDs and anchor links
      let headingIdx = 0;
      html = html.replace(/^(#{1,6})\s+(.+)$/gm, (_, hashes, text) => {
        const level = hashes.length;
        const id = 'h-' + (headingIdx++) + '-' + text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
        const anchor = `<a class="heading-anchor" data-target="${id}" title="Link to this heading">#</a>`;
        return `<h${level} id="${id}">${text}${anchor}</h${level}>`;
      });

      html = html.replace(/^---+$/gm, '<hr>');
      html = html.replace(/^&gt;\s+(.+)$/gm, '<blockquote><p>$1</p></blockquote>');
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

      // Tables
      html = html.replace(/^(\|.+\|)\n(\|[-|\s:]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // Lists
      html = html.replace(/^(\s*)- \[x\]\s+(.+)$/gm, '$1<li class="task-list-item"><input type="checkbox" checked disabled> $2</li>');
      html = html.replace(/^(\s*)- \[ \]\s+(.+)$/gm, '$1<li class="task-list-item"><input type="checkbox" disabled> $2</li>');
      html = html.replace(/^(\s*)[-*+]\s+(.+)$/gm, (_, indent, text) =>
        `<li style="margin-left:${Math.floor(indent.length / 2) * 16}px">${text}</li>`
      );
      html = html.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      html = html.replace(/^(\s*)\d+\.\s+(.+)$/gm, '<oli>$2</oli>');
      html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, m =>
        '<ol>' + m.replace(/<\/?oli>/g, t => t.replace('oli', 'li')) + '</ol>'
      );

      html = html.replace(/^(?!<[a-z/])((?!<).+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      return html;
    }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ═══════════════════════════════════════
    // UI EVENTS
    // ═══════════════════════════════════════
    toggleSidebarBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'b') { e.preventDefault(); sidebar.classList.toggle('collapsed'); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'e' && currentFile) {
        e.preventDefault();
        if (isEditing) { if (isDirty && !confirm('Discard unsaved changes?')) return; isEditing = false; isDirty = false; renderPreview(); }
        else { isEditing = true; isSplitView = false; contentWrapper.classList.remove('split-view'); splitEditor.innerHTML = ''; renderEditor(); }
        updateToolbar();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === '\\' && currentFile && !isEditing) { e.preventDefault(); toggleSplit(); }
      if ((e.metaKey || e.ctrlKey) && e.key === 's' && isSplitView) { e.preventDefault(); saveFile(); }
    });

    // ── Init ──
    loadTree();

  })();
  </script>
</body>
