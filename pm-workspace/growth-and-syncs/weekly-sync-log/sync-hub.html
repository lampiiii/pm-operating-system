<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1:1 Check-in — PM Workspace</title>
  <!-- Replace with your own favicon: <link rel="icon" href="/resources/favicon.png" type="image/png"> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text: #1a1a1a;
      --text-secondary: #5f6368;
      --text-muted: #9aa0a6;
      --surface: #ffffff;
      --surface-dim: #f8f9fa;
      --border: #e8eaed;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #5f6368;
      --surface: #1e1e32;
      --surface-dim: #131325;
      --border: #2d2d4a;
    }
    [data-theme="dark"] .global-nav { background: rgba(19,19,37,0.95); }
    [data-theme="dark"] .card {
      --card-bg: color-mix(in srgb, var(--accent) 12%, #1e1e32);
      --card-bg-hover: color-mix(in srgb, var(--accent) 18%, #1e1e32);
      --initials-bg: color-mix(in srgb, var(--accent) 25%, #2a2a44);
      --count-color: var(--text);
    }

    body {
      font-family: 'Google Sans', 'Google Sans Text', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface-dim);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-top: 64px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .bento {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      --card-bg: color-mix(in srgb, var(--accent) 6%, var(--surface));
      --card-bg-hover: color-mix(in srgb, var(--accent) 12%, var(--surface));
      --initials-bg: color-mix(in srgb, var(--accent) 14%, var(--surface));
      --count-color: color-mix(in srgb, var(--accent) 70%, var(--text));

      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      min-height: 170px;
    }

    .card:hover {
      background: var(--card-bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .card-initials {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      background: var(--initials-bg);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .card-role {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .card-bottom {
      margin-top: auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-top: 16px;
    }

    .card-count {
      font-size: 32px;
      font-weight: 500;
      color: var(--count-color);
      line-height: 1;
    }

    .card-count.zero {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 28px;
    }

    .card-count-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition);
      opacity: 0;
    }

    .card:hover .card-arrow {
      opacity: 1;
      color: var(--accent);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 560px) {
      .bento { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<script src="/resources/navbar.js" defer></script>

<div class="container">
  <div class="page-header">
    <h1>1:1 Check-in</h1>
  </div>

  <div class="bento" id="cards-grid">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
(function() {
  const grid = document.getElementById('cards-grid');

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase();
  }

  async function loadPeople() {
    try {
      const res = await fetch('/api/sync-people');
      const data = await res.json();
      const people = data.people || [];

      if (people.length === 0) {
        grid.innerHTML = '<div class="empty-state">No 1:1 relationships configured.</div>';
        return;
      }

      grid.innerHTML = people.map(p => {
        const initials = getInitials(p.name);
        const countClass = p.queuedCount > 0 ? '' : ' zero';

        return `
          <a href="/sync?person=${p.slug}" class="card" style="--accent: ${p.color}">
            <div class="card-initials">${initials}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-role">${p.role}</div>
            <div class="card-bottom">
              <div>
                <div class="card-count${countClass}">${p.queuedCount}</div>
                <div class="card-count-label">to discuss</div>
              </div>
              <div class="card-arrow">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          </a>`;
      }).join('');

    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Failed to load. Is the server running?</div>';
    }
  }

  loadPeople();
})();
</script>

</body>
</html>
